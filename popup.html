<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Betclic AI</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 360px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f172a;
      color: #cbd5e1;
    }

    .header {
      background: #1e293b;
      padding: 12px 16px;
      border-bottom: 1px solid #1e3a5f;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .header-icon  { font-size: 22px; }
    .header-title { font-size: 14px; font-weight: 700; color: #f1f5f9; }
    .header-sub   { font-size: 10px; color: #475569; margin-top: 1px; }

    .tabs { display: flex; border-bottom: 1px solid #1e293b; }
    .tab-btn {
      flex: 1;
      padding: 9px 0;
      background: none;
      border: none;
      border-bottom: 2px solid transparent;
      font-size: 11px;
      font-weight: 600;
      color: #475569;
      cursor: pointer;
    }
    .tab-btn.active      { color: #60a5fa; border-bottom-color: #3b82f6; }
    .tab-btn:hover:not(.active) { color: #94a3b8; }

    .body { padding: 12px 14px; }

    .match-box {
      background: #1e293b;
      border: 1px solid #1e3a5f;
      border-radius: 8px;
      padding: 10px 12px;
      margin-bottom: 10px;
      min-height: 52px;
    }
    .match-label { font-size: 9px; color: #475569; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px; }
    .match-name  { font-size: 13px; font-weight: 700; color: #f1f5f9; }
    .match-sub   { font-size: 10px; color: #64748b; margin-top: 3px; }
    .match-none  { font-size: 11px; color: #475569; font-style: italic; }

    .mode-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 10px;
    }
    .mode-label  { font-size: 11px; color: #64748b; }
    .toggle-wrap { display: flex; background: #1e293b; border-radius: 6px; padding: 2px; gap: 2px; }
    .mode-btn {
      padding: 4px 10px;
      border: none;
      border-radius: 4px;
      font-size: 10px;
      font-weight: 600;
      cursor: pointer;
      background: none;
      color: #475569;
    }
    .mode-btn.active { background: #1e3a5f; color: #60a5fa; }

    .analyze-btn {
      width: 100%;
      padding: 10px;
      background: #1d4ed8;
      border: none;
      border-radius: 8px;
      font-size: 12px;
      font-weight: 700;
      color: #fff;
      cursor: pointer;
    }
    .analyze-btn:hover:not([disabled]) { background: #2563eb; }
    .analyze-btn[disabled] { opacity: 0.45; cursor: default; }

    .error-box {
      margin-top: 10px;
      padding: 9px 12px;
      background: rgba(239,68,68,.1);
      border: 1px solid rgba(239,68,68,.25);
      border-radius: 8px;
      font-size: 11px;
      color: #f87171;
    }

    .loading-box {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 12px;
      font-size: 11px;
      color: #64748b;
    }
    .spinner {
      width: 14px; height: 14px;
      border: 2px solid #1e293b;
      border-top-color: #3b82f6;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      flex-shrink: 0;
    }

    /* Les tickets sont des <bet-ticket> insérés en JS — gap entre eux */
    #tickets-container { margin-top: 12px; display: flex; flex-direction: column; gap: 8px; }

    .settings-body { padding: 12px 14px; display: flex; flex-direction: column; gap: 14px; }
    .field-group   { display: flex; flex-direction: column; gap: 5px; }
    .field-label   { font-size: 10px; font-weight: 600; color: #475569; text-transform: uppercase; letter-spacing: 0.5px; }
    .field-hint    { font-size: 9px; color: #334155; }

    input[type="text"] {
      width: 100%;
      background: #1e293b;
      border: 1px solid #1e3a5f;
      border-radius: 6px;
      padding: 8px 10px;
      font-size: 11px;
      color: #f1f5f9;
      outline: none;
      font-family: inherit;
    }
    input[type="text"]:focus { border-color: #3b82f6; }
    input[type="text"]::placeholder { color: #334155; }

    .save-btn {
      padding: 9px;
      background: #1e3a5f;
      border: 1px solid #2d5a9e;
      border-radius: 6px;
      font-size: 11px;
      font-weight: 600;
      color: #93c5fd;
      cursor: pointer;
      width: 100%;
    }
    .save-btn:hover { background: #1e4a7a; }
    .save-feedback  { text-align: center; font-size: 10px; color: #22c55e; min-height: 14px; }

    .footer {
      border-top: 1px solid #1e293b;
      padding: 7px 14px;
      font-size: 9px;
      color: #1e3a5f;
      display: flex;
      justify-content: space-between;
    }

    [x-cloak] { display: none !important; }

    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>

<body x-data="betAnalyzer" x-init="init">

  <div class="header">
    <span class="header-icon">⚽</span>
    <div>
      <div class="header-title">Betclic AI</div>
      <div class="header-sub">Assistant paris sportifs</div>
    </div>
  </div>
  <div class="tabs">
    <button class="tab-btn" :class="analyseTabClass"  @click="gotoAnalyse">Analyse</button>
    <button class="tab-btn" :class="settingsTabClass" @click="gotoSettings">Paramètres</button>
  </div>
  <div x-show="panelAnalyse" x-cloak>
    <div class="body">

      <div class="match-box">
        <div class="match-label">Match détecté</div>
        <div class="match-none" x-show="noMatch">Aucun match — allez sur une page Betclic</div>
        <div x-show="hasMatch">
          <div class="match-name" x-text="matchName"></div>
          <div class="match-sub"  x-text="matchSub"></div>
        </div>
      </div>

      <div class="mode-row">
        <span class="mode-label">Mode</span>
        <div class="toggle-wrap">
          <button class="mode-btn" :class="normalModeClass"     @click="setNormalMode">Normal</button>
          <button class="mode-btn" :class="aggressiveModeClass" @click="setAggressiveMode">Agressif</button>
        </div>
      </div>

      <button class="analyze-btn" :disabled="analyzeDisabled" @click="analyze">
        Analyser ce match
      </button>

      <div class="error-box" x-show="hasError" x-text="errorText"></div>

      <div class="loading-box" x-show="loading">
        <div class="spinner"></div>
        <span x-text="loadingText"></span>
      </div>
      <div id="tickets-container"></div>

    </div>
  </div>

  <!-- ── Panel Paramètres ── -->
  <div x-show="panelSettings" x-cloak>
    <div class="settings-body">

      <div class="field-group">
        <label class="field-label">Base URL Ollama</label>
        <input type="text" x-model="apiBase" placeholder="http://localhost:8080">
        <span class="field-hint">Défaut : http://localhost:8080</span>
      </div>

      <div class="field-group">
        <label class="field-label">Modèle</label>
        <input type="text" x-model="apiModel" placeholder="qwen2.5-coder:latest">
        <span class="field-hint">Défaut : qwen2.5-coder:latest</span>
      </div>

      <button class="save-btn" @click="saveSettings">Sauvegarder</button>
      <div class="save-feedback" x-text="saveFeedback"></div>

    </div>
  </div>

  <div class="footer">
    <span>Web Component + Alpine.js CSP · MV3</span>
    <span>v1.0</span>
  </div>

  <script src="/src/popup.js" type="module"></script>
</body>
</html>
