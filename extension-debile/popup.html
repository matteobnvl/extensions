<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>BetAnalyzer</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 280px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f172a;
      color: #cbd5e1;
    }

    .header {
      background: #1e293b;
      padding: 14px 16px;
      border-bottom: 1px solid #1e3a5f;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .header-icon { font-size: 26px; }
    .header-title { font-size: 15px; font-weight: 700; color: #f1f5f9; }
    .header-sub { font-size: 10px; color: #475569; margin-top: 2px; }

    .body { padding: 12px 16px; }

    .row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 11px;
      padding: 7px 0;
      border-bottom: 1px solid #1e293b;
      color: #64748b;
    }
    .row:last-child { border-bottom: none; }
    .row-val { font-weight: 600; color: #93c5fd; }

    .status-dot {
      display: inline-block;
      width: 7px; height: 7px;
      border-radius: 50%;
      background: #22c55e;
      margin-right: 5px;
      vertical-align: middle;
    }

    .section {
      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px solid #1e293b;
    }
    .section-title {
      font-size: 10px;
      font-weight: 700;
      color: #475569;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 8px;
    }

    .input-wrap { position: relative; }
    input[type="password"], input[type="text"] {
      width: 100%;
      background: #1e293b;
      border: 1px solid #1e3a5f;
      border-radius: 6px;
      padding: 7px 32px 7px 10px;
      font-size: 11px;
      color: #f1f5f9;
      outline: none;
    }
    input:focus { border-color: #3b82f6; }
    input::placeholder { color: #334155; }

    .toggle-btn {
      position: absolute;
      right: 8px; top: 50%;
      transform: translateY(-50%);
      background: none; border: none;
      color: #475569; cursor: pointer;
      font-size: 12px; padding: 0;
    }
    .toggle-btn:hover { color: #94a3b8; }

    .save-btn {
      margin-top: 7px;
      width: 100%;
      background: #1e3a5f;
      border: 1px solid #2d5a9e;
      border-radius: 6px;
      padding: 7px;
      font-size: 11px;
      font-weight: 600;
      color: #93c5fd;
      cursor: pointer;
    }
    .save-btn:hover { background: #1e4a7a; }
    .save-btn:disabled { opacity: 0.5; cursor: default; }

    .feedback {
      margin-top: 6px;
      font-size: 10px;
      text-align: center;
      height: 14px;
    }
    .feedback.ok  { color: #22c55e; }
    .feedback.err { color: #ef4444; }

    .key-status {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 10px;
      margin-bottom: 8px;
    }
    .key-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .key-dot.set   { background: #22c55e; }
    .key-dot.unset { background: #ef4444; }

    .footer {
      border-top: 1px solid #1e293b;
      padding: 8px 16px;
      font-size: 9px;
      color: #1e3a5f;
      display: flex;
      justify-content: space-between;
    }
  </style>
</head>
<body>
  <div class="header">
    <span class="header-icon">📊</span>
    <div>
      <div class="header-title">BetAnalyzer</div>
      <div class="header-sub">Analyse des cotes en temps réel</div>
    </div>
  </div>

  <div class="body">
    <div class="row">
      <span><span class="status-dot"></span>Statut</span>
      <span class="row-val" id="status">Actif</span>
    </div>
    <div class="row">
      <span>Source des stats</span>
      <span class="row-val">Flashscore API</span>
    </div>

    <div class="section">
      <div class="section-title">Clé RapidAPI</div>
      <div class="key-status">
        <span class="key-dot" id="key-dot"></span>
        <span id="key-label"></span>
      </div>
      <div class="input-wrap">
        <input type="password" id="api-key-input" placeholder="Coller la clé RapidAPI ici" autocomplete="off" spellcheck="false">
        <button class="toggle-btn" id="toggle-visibility" title="Afficher/masquer">👁</button>
      </div>
      <button class="save-btn" id="save-btn">Sauvegarder</button>
      <div class="feedback" id="feedback"></div>
    </div>
  </div>

  <div class="footer">
    <span>Micro Frontend · Web Components</span>
    <span>v1.0</span>
  </div>

  <script src="/src/popup.js" type="module"></script>
</body>
</html>
