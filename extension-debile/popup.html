<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>BetAnalyzer</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 280px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f172a;
      color: #cbd5e1;
    }

    .header {
      background: #1e293b;
      padding: 14px 16px;
      border-bottom: 1px solid #1e3a5f;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .header-icon { font-size: 26px; }
    .header-title { font-size: 15px; font-weight: 700; color: #f1f5f9; }
    .header-sub { font-size: 10px; color: #475569; margin-top: 2px; }

    .body { padding: 12px 16px; }

    .row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 11px;
      padding: 7px 0;
      border-bottom: 1px solid #1e293b;
      color: #64748b;
    }
    .row:last-child { border-bottom: none; }
    .row-val { font-weight: 600; color: #93c5fd; }

    .status-dot {
      display: inline-block;
      width: 7px; height: 7px;
      border-radius: 50%;
      background: #22c55e;
      margin-right: 5px;
      vertical-align: middle;
    }

    .footer {
      border-top: 1px solid #1e293b;
      padding: 8px 16px;
      font-size: 9px;
      color: #1e3a5f;
      display: flex;
      justify-content: space-between;
    }

    .sites {
      margin: 8px 0 4px;
      font-size: 10px;
      color: #334155;
    }
    .site-tag {
      display: inline-block;
      background: #1e293b;
      border-radius: 4px;
      padding: 2px 6px;
      margin: 2px 2px 0 0;
      color: #475569;
    }
  </style>
</head>
<body>
  <div class="header">
    <span class="header-icon">📊</span>
    <div>
      <div class="header-title">BetAnalyzer</div>
      <div class="header-sub">Analyse des cotes en temps réel</div>
    </div>
  </div>

  <div class="body">
    <div class="row">
      <span><span class="status-dot"></span>Statut</span>
      <span class="row-val" id="status">Actif</span>
    </div>
    <div class="row">
      <span>Source des stats</span>
      <span class="row-val">Flashscore API</span>
    </div>
    <div class="row">
      <span>Méthode</span>
      <span class="row-val">Shadow DOM · Alpine.js</span>
    </div>

    <div class="sites">
      Sites supportés :
      <div style="margin-top:4px">
        <span class="site-tag">betclic.fr</span>
        <span class="site-tag">winamax.fr</span>
        <span class="site-tag">unibet.fr</span>
        <span class="site-tag">pmu.fr</span>
      </div>
    </div>
  </div>

  <div class="footer">
    <span>Micro Frontend · Web Components</span>
    <span>v1.0</span>
  </div>

  <script src="/src/popup.js" type="module"></script>
</body>
</html>
